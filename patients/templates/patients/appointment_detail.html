<h2>Appointment Details</h2>

<p><strong>Doctor:</strong> {{ appointment.doctor.name }}</p>
<p><strong>Date:</strong> {{ appointment.appointment_date }}</p>
<p><strong>Time:</strong> {{ appointment.appointment_time }}</p>
<p><strong>Status:</strong> {{ appointment.status }}</p>

<br>

<form method="POST" action="{% url 'cancel_appointment' appointment.appointment_id %}" 
      onsubmit="return confirm('Are you sure you want to cancel this appointment?');">
    {% csrf_token %}
    <button type="submit" style="color:white; background:red; padding:10px; border:none; border-radius:5px;">
        Cancel Appointment
    </button>
</form>

<br><br>

<a href="{% url 'patient_dashboard' %}">Back to Dashboard</a>
