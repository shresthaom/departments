<h2>Book Appointment with {{ doctor.name }}</h2>

<form method="POST">
    {% csrf_token %}

    <label>Date:</label><br>
    <input type="date" name="date" required><br><br>

    <label>Time:</label><br>
    <input type="time" name="time" required><br><br>

    <button type="submit">Confirm Booking</button>
</form>
